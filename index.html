<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LARA Kratom</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f7f5f2;
      color: #2f3e34;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      font-weight: 500;
      letter-spacing: 2px;
    }

    nav a {
      margin-left: 20px;
      text-decoration: none;
      color: #2f3e34;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 18px;
      color: #6b7d73;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #5f7c6d;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .products {
      display: flex;
      gap: 20px;
      padding: 60px 40px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: white;
      padding: 20px;
      width: 260px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      text-align: center;
    }

    .card h3 {
      margin: 10px 0;
    }

    footer {
      text-align: center;
      padding: 40px;
      font-size: 14px;
      color: #888;
    }
  </style>

</head>

<body>

<header>
  <h1>LARA</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Clean. Smart. Controlled.</h2>
  <p>Premium Kratom from Indonesia. Lab-tested & export ready.</p>
  <a href="#" class="btn">Explore Products</a>
</section>

<section class="products">
  <div class="card">
    <h3>LARA Green</h3>
    <p>Balanced energy & focus</p>
  </div>

  <div class="card">
    <h3>LARA Balance</h3>
    <p>Calm & steady mood</p>
  </div>

  <div class="card">
    <h3>LARA Focus</h3>
    <p>Sharp clarity & productivity</p>
  </div>
</section>

<footer>
  © 2026 LARA Kratom — Premium Botanical Supply
</footer>

</body>
</html>
